<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Black Box Explainer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              shell: "#060816",
              panel: "#0f172a",
              panelsoft: "#131d34",
              panelstrong: "#17233d",
              line: "#233252",
              copy: "#e5edf8",
              subcopy: "#93a4c3",
              accent: "#38bdf8"
            },
            boxShadow: {
              panel: "0 18px 40px rgba(2, 6, 23, 0.42)"
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-shell text-copy bg-[radial-gradient(circle_at_top_left,rgba(14,165,233,0.18),transparent_24%),radial-gradient(circle_at_top_right,rgba(59,130,246,0.14),transparent_22%),linear-gradient(180deg,#07101f_0%,#060816_100%)]">
    {% block body %}{% endblock %}
  </body>
</html>
